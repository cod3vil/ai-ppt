appId: com.github.cod3vil.aippt
productName: AI-PPT
compression: maximum
afterPack: ./scripts/after-pack.cjs
directories:
  buildResources: build
files:
  - '!**/.DS_Store'
  - '!**/._*'
  - '!**/.vscode/*'
  - '!**/.idea/**'
  - '!**/.git/**'
  - '!src/**'
  - '!tools/**'
  - '!scripts/**'
  - '!assets/**'
  - '!docs/**'
  - '!doc/**'
  - '!logs/**'
  - '!patch/**'
  - '!tpack/**'
  - '!dist/**'
  - '!.claude/**'
  - '!.pnpm-store/**'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!README_*'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!**/*.map'
  - '!**/*.tsbuildinfo'
  - '!*.db'
  - '!*.db-*'
  - '!{local.dev.db,local.db,ohmyppt.dev.db,ohmyppt.db,ai-ppt.dev.db,ai-ppt.db}'
  - '!thumb.png'
  - '!node_modules/tiktoken'
  - '!node_modules/web-streams-polyfill'
  # Drop dev-only / non-runtime artifacts from packaged node_modules.
  # NOTE: We deliberately avoid excluding directories by name (test, tests,
  # __tests__, doc, docs, example, examples, man) — libraries like langchain
  # and yaml ship runtime modules under those nested paths (e.g.
  # `langchain/dist/agents/tests/utils.js`, `yaml/dist/doc/directives.js`)
  # and the broad glob ends up breaking startup.
  - '!node_modules/**/{*.d.ts,*.flow,*.markdown,*.map}'
  - '!node_modules/**/.bin/**'
  - '!node_modules/**/{appveyor.yml,.travis.yml,circle.yml,.editorconfig,.eslintrc*,.prettierrc*,tsconfig*.json,rollup.config.*,webpack.config.*}'
electronLanguages:
  - en-US
  - zh-CN
asarUnpack:
  - resources/**
  - node_modules/@node-rs/**/*.node
extraResources:
  - from: build/icons/icon.ico
    to: icons/icon.ico
  - from: build/icons/32x32.png
    to: icons/32x32.png
  - from: build/icons/16x16.png
    to: icons/16x16.png
forceCodeSigning: false
win:
  target:
    - target: nsis
      arch:
        - x64
  executableName: ai-ppt
  icon: build/icons/icon.ico
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  installerIcon: build/icons/icon.ico
  uninstallerIcon: build/icons/icon.ico
  installerHeaderIcon: build/icons/icon.ico
  unicode: true
  warningsAsErrors: false
  runAfterFinish: false
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createStartMenuShortcut: true
  include: installer.nsh
mac:
  icon: build/icons/icon.icns
  # Ad-hoc signing ('-' identity) so Apple Silicon Macs can launch the unsigned
  # app without "damaged" errors. Still not notarized — users may need to
  # right-click → Open the first time, or run:
  #   xattr -dr com.apple.quarantine /Applications/AI-PPT.app
  identity: '-'
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - deb
  icon: build/icons/icon.png
  maintainer: NJMD
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: generic
  url: https://github.com/cod3vil/ai-ppt/releases/download/latest
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
